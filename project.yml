name: SalahTimes
options:
  bundleIdPrefix: uz.khoshimjonov
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

packages:
  SalahCore:
    path: SalahCore

targets:
  SalahTimes:
    type: application
    platform: macOS
    sources:
      - SalahTimes
    resources:
      - SalahTimes/Resources
    info:
      path: SalahTimes/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: Salah Times
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Khoshimjonov"
        CFBundleLocalizations:
          - en
          - uz
          - ru
    entitlements:
      path: SalahTimes/SalahTimes.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uz.khoshimjonov.SalahTimes
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SalahTimes/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: SalahCore
        product: SalahCore
